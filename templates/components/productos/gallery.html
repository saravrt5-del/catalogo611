<section class="pb-24 bg-[#f8f5f1]">
    <div class="container-editorial">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

            {% for producto in productos %}

            <article
                class="product-card group bg-white border border-black/10 p-4 cursor-pointer hover:shadow-xl transition duration-300"
                data-brand="{{ producto.categoria }}"
                data-codigo="{{ producto.codigo }}"
                data-nombre="{{ producto.nombre }}"
                data-marca="{{ producto.marca }}"
                data-precio="{{ producto.precio }}"
                data-descripcion="{{ producto.descripcion }}"
                data-imagen="{{ url_for('static', filename=producto.imagen) }}">

                <div class="aspect-[4/5] overflow-hidden bg-[#eee] abrir-modal">
                    <img
                        src="{{ url_for('static', filename=producto.imagen) }}"
                        alt="{{ producto.nombre }}"
                        class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                </div>

                <div class="pt-5">
                    <p class="text-[11px] uppercase tracking-[0.25em] text-[#8b1e2d]">
                        {{ producto.marca }}
                    </p>

                    <h3 class="text-2xl mt-2">
                        {{ producto.nombre }}
                    </h3>

                    <p class="font-semibold mt-3">
                        {{ producto.precio }}
                    </p>

                    <p class="text-xs text-gray-500 mt-1">
                        Código: {{ producto.codigo }}
                    </p>

                    <button
                        type="button"
                        class="btn-agregar mt-4 w-full bg-[#8b1e2d] text-white text-sm py-3 rounded-full hover:bg-black transition">
                        Agregar para consultar
                    </button>
                </div>

            </article>

            {% endfor %}

        </div>
    </div>
</section>

<div id="cartBox" class="fixed bottom-6 right-6 bg-white border border-black/10 shadow-2xl rounded-2xl p-5 w-80 z-50 hidden">
    <div class="flex justify-between items-center mb-3">
        <h3 class="font-semibold text-lg">Productos elegidos</h3>
        <button type="button" onclick="clearCart()" class="text-xs text-gray-500 hover:text-black">
            Vaciar
        </button>
    </div>

    <div id="cartItems" class="space-y-2 text-sm max-h-52 overflow-y-auto"></div>

    <a
        id="whatsappLink"
        href="#"
        target="_blank"
        class="block mt-4 text-center bg-green-600 text-white py-3 rounded-full text-sm hover:bg-green-700 transition">
        Preguntar por WhatsApp
    </a>
</div>

{% include 'components/productos/product-modal.html' %}

<script>
    let cart = [];

    document.querySelectorAll(".product-card").forEach(function(card) {
        card.addEventListener("click", function(e) {
            if (e.target.classList.contains("btn-agregar")) {
                return;
            }

            openProductModal(
                card.dataset.nombre,
                card.dataset.marca,
                card.dataset.precio,
                card.dataset.descripcion,
                card.dataset.imagen
            );
        });
    });

    document.querySelectorAll(".btn-agregar").forEach(function(button) {
        button.addEventListener("click", function(e) {
            e.stopPropagation();

            const card = button.closest(".product-card");

            addToCart(
                card.dataset.codigo,
                card.dataset.nombre,
                card.dataset.marca,
                card.dataset.precio
            );
        });
    });

    function addToCart(codigo, nombre, marca, precio) {
        cart.push({ codigo, nombre, marca, precio });
        renderCart();
    }

    function renderCart() {
        const cartBox = document.getElementById("cartBox");
        const cartItems = document.getElementById("cartItems");
        const whatsappLink = document.getElementById("whatsappLink");

        cartBox.classList.remove("hidden");

        cartItems.innerHTML = cart.map(function(item, index) {
            return `
                <div class="border-b border-black/10 pb-2">
                    <p class="font-medium">${index + 1}. ${item.codigo}</p>
                    <p class="text-gray-500">${item.nombre} - ${item.precio}</p>
                </div>
            `;
        }).join("");

        const mensaje = cart.map(function(item, index) {
            return `${index + 1}. ${item.codigo}`;
        }).join("\n");

        const textoFinal = encodeURIComponent(
            "Hola, quiero consultar por estos productos:\n\n" + mensaje
        );

        whatsappLink.href = "https://wa.me/573108111384?text=" + textoFinal;
    }

    function clearCart() {
        cart = [];
        document.getElementById("cartBox").classList.add("hidden");
        document.getElementById("cartItems").innerHTML = "";
    }
</script>
