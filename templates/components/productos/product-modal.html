<!-- MODAL PRODUCTO -->

<div
    id="productModal"
    class="fixed inset-0 z-[9999] hidden bg-black/70 backdrop-blur-sm p-4 overflow-y-auto">

    <div class="min-h-screen flex items-center justify-center">

        <div class="relative bg-[#f8f5f1] max-w-6xl w-full rounded-xl overflow-hidden shadow-2xl">

            <!-- BOTON CERRAR -->

            <button
                onclick="closeProductModal()"
                class="fixed top-5 right-5 z-[10000] w-12 h-12 bg-white rounded-full text-2xl shadow-lg hover:bg-[#8b1e2d] hover:text-white transition">

                ×

            </button>

            <div class="grid lg:grid-cols-2">

                <!-- IMAGEN -->

                <div class="bg-white">

                    <img
                        id="modalImage"
                        src=""
                        alt=""
                        class="w-full max-h-[80vh] object-cover">

                </div>

                <!-- INFORMACION -->

                <div class="p-8 md:p-14 flex flex-col justify-center">

                    <p
                        id="modalBrand"
                        class="text-[11px] uppercase tracking-[0.35em] text-[#8b1e2d] mb-4">
                    </p>

                    <h2
                        id="modalName"
                        class="font-serif text-5xl md:text-6xl leading-none mb-6">
                    </h2>

                    <p
                        id="modalDescription"
                        class="text-[#666] leading-8 mb-10">
                    </p>

                    <div class="border-t border-black/10 pt-8 space-y-5">

                        <div class="flex justify-between">

                            <span class="uppercase text-xs tracking-[0.25em] text-[#888]">
                                Precio
                            </span>

                            <strong id="modalPrice"></strong>

                        </div>

                        <div class="flex justify-between">

                            <span class="uppercase text-xs tracking-[0.25em] text-[#888]">
                                Disponibilidad
                            </span>

                            <strong>
                                Bajo pedido
                            </strong>

                        </div>

                        <div class="flex justify-between">

                            <span class="uppercase text-xs tracking-[0.25em] text-[#888]">
                                Entrega
                            </span>

                            <strong>
                                Consultar
                            </strong>

                        </div>

                    </div>

                    <a
                        id="modalWhatsapp"
                        href="https://wa.me/573000000000"
                        target="_blank"
                        class="mt-10 bg-[#8b1e2d] text-white text-center py-4 uppercase tracking-[0.25em] text-sm hover:bg-[#6d1320] transition">

                        Consultar por WhatsApp

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function openProductModal(name, brand, price, description, image){

    document.getElementById('modalName').innerText = name;

    document.getElementById('modalBrand').innerText = brand;

    document.getElementById('modalPrice').innerText = price;

    document.getElementById('modalDescription').innerText = description;

    document.getElementById('modalImage').src = image;

    const whatsappMessage =
    `Hola, me interesa el producto ${name}`;

    document.getElementById('modalWhatsapp').href =
    `https://wa.me/573108111384?text=${encodeURIComponent(whatsappMessage)}`;

    document.getElementById('productModal').classList.remove('hidden');

    document.body.style.overflow = 'hidden';
}

function closeProductModal(){

    document.getElementById('productModal').classList.add('hidden');

    document.body.style.overflow = 'auto';

}

document.getElementById('productModal').addEventListener('click', function(e){

    if(e.target === this){

        closeProductModal();

    }

});

</script>
